<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">ええやん！.ai の Azure アーキテクチャ</title>
  <desc id="desc">Next.js を Azure Container Apps で動かし、Azure OpenAI、PostgreSQL、Blob Storage、Application Insights と連携する構成。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="70" y="82" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="34" font-weight="700" fill="#1e293b">Azure アーキテクチャ</text>

  <g filter="url(#shadow)">
    <rect x="60" y="180" width="210" height="130" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="165" y="230" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="24" font-weight="700" fill="#1e293b">Browser</text>
    <text x="165" y="265" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="16" fill="#475569">ユーザー</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="385" y="155" width="310" height="180" rx="24" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="540" y="216" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="25" font-weight="700" fill="#075985">Container Apps</text>
    <text x="540" y="252" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="19" font-weight="700" fill="#0369a1">Next.js 16</text>
    <text x="540" y="284" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="16" fill="#0369a1">Vercel AI SDK</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="130" width="250" height="110" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="975" y="175" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">Azure OpenAI</text>
    <text x="975" y="205" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#1e40af">gpt-5.4-mini</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="285" width="250" height="110" rx="18" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="975" y="330" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="22" font-weight="700" fill="#6d28d9">PostgreSQL</text>
    <text x="975" y="360" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#5b21b6">Prisma 7</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="440" width="250" height="110" rx="18" fill="#ffffff" stroke="#86efac"/>
    <text x="975" y="485" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="22" font-weight="700" fill="#15803d">Blob Storage</text>
    <text x="975" y="515" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#166534">作品画像</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="390" y="485" width="300" height="110" rx="18" fill="#ffffff" stroke="#fbbf24"/>
    <text x="540" y="528" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="22" font-weight="700" fill="#92400e">Application Insights</text>
    <text x="540" y="558" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#92400e">OpenTelemetry</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="105" y="500" width="230" height="100" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="220" y="540" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="18" font-weight="700" fill="#334155">Container Registry</text>
    <text x="220" y="570" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#475569">amd64 image</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="805" y="610" width="295" height="82" rx="18" fill="#f0fdf4" stroke="#86efac"/>
    <text x="952" y="645" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="20" font-weight="700" fill="#166534">Managed Identity</text>
    <text x="952" y="672" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="14" fill="#166534">Blob Storage 権限</text>
  </g>

  <path d="M280 245 H365" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M705 218 H830" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M705 276 C760 285 793 310 830 334" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M705 306 C773 378 789 449 830 490" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M540 345 V465" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M345 548 C390 460 400 390 438 344" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M950 610 V565" stroke="#16a34a" stroke-width="4" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
</svg>
