  <path d="M560 250 H625" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M955 205 C985 188 995 168 1005 155" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M955 258 H1000" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M955 300 C990 338 998 390 1005 430" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M955 318 C1000 395 1000 515 1010 575" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M795 345 V485" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M340 590 C480 505 565 395 635 310" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1120 690 V655 H1270 V435 H1255" stroke="#16a34a" stroke-width="4" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
</svg>
