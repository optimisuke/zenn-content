    <text x="1135" y="288" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="21" font-weight="700" fill="#6d28d9">PostgreSQL</text>
    <text x="1135" y="318" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#5b21b6">Prisma 7</text>
  </g>

  <g filter="url(#shadow)">
