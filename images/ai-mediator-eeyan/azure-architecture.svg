    <text x="1135" y="598" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#6b21a8">課金 / Webhook</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="645" y="505" width="300" height="110" rx="18" fill="#ffffff" stroke="#fbbf24"/>
    <text x="795" y="548" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="22" font-weight="700" fill="#92400e">Application Insights</text>
    <text x="795" y="578" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#92400e">OpenTelemetry</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="540" width="240" height="100" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="210" y="580" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="18" font-weight="700" fill="#334155">Container Registry</text>
    <text x="210" y="610" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#475569">amd64 image</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="990" y="690" width="260" height="82" rx="18" fill="#f0fdf4" stroke="#86efac"/>
    <text x="1120" y="725" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="20" font-weight="700" fill="#166534">Managed Identity</text>
    <text x="1120" y="752" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="14" fill="#166534">Blob Storage 権限</text>
  </g>

