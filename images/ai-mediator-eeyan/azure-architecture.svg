<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="820" viewBox="0 0 1300 820" role="img" aria-labelledby="title desc">
  <title id="title">ええやん.ai! の Azure アーキテクチャ</title>
  <desc id="desc">Cloudflare でドメイン、DNS、WAF を担い、Next.js を Azure Container Apps で動かし、Azure OpenAI、PostgreSQL、Blob Storage、Application Insights、Stripe と連携する構成。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1300" height="820" fill="#f8fafc"/>
  <text x="70" y="82" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="34" font-weight="700" fill="#1e293b">全体アーキテクチャ</text>

  <g filter="url(#shadow)">
    <rect x="60" y="190" width="200" height="120" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="160" y="238" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="24" font-weight="700" fill="#1e293b">Browser</text>
    <text x="160" y="272" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="16" fill="#475569">ユーザー</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="330" y="175" width="220" height="150" rx="20" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
    <text x="440" y="225" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="24" font-weight="700" fill="#c2410c">Cloudflare</text>
    <text x="440" y="258" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#9a3412">ドメイン / DNS</text>
    <text x="440" y="285" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#9a3412">WAF / Rate Limit</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="645" y="155" width="300" height="180" rx="24" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="795" y="215" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="25" font-weight="700" fill="#075985">Container Apps</text>
    <text x="795" y="250" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="19" font-weight="700" fill="#0369a1">Next.js 16</text>
    <text x="795" y="282" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="16" fill="#0369a1">Vercel AI SDK</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1020" y="105" width="230" height="100" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="1135" y="148" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="21" font-weight="700" fill="#1d4ed8">Azure OpenAI</text>
    <text x="1135" y="178" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#1e40af">gpt-5.4-mini</text>
  </g>

  <g filter="url(#shadow)">
