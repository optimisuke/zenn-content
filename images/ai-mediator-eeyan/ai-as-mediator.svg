<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">生成AIが仲介者になる構造</title>
  <desc id="desc">作者、スタッフ、鑑賞者がAIコメントを共通の参照点として会話する構造。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="640" fill="#f8fafc"/>
  <text x="70" y="82" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="34" font-weight="700" fill="#1e293b">AIコメントが共通の話題になる</text>

  <g filter="url(#shadow)">
    <circle cx="600" cy="325" r="110" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"/>
    <text x="600" y="306" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="30" font-weight="700" fill="#075985">AIコメント</text>
    <text x="600" y="342" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="17" fill="#0369a1">話題の起点</text>
    <text x="600" y="368" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="17" fill="#0369a1">共通の参照点</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="85" y="240" width="220" height="150" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="195" y="293" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="26" font-weight="700" fill="#1e293b">作者</text>
    <text x="195" y="330" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="16" fill="#475569">自分の作品を</text>
    <text x="195" y="356" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="16" fill="#475569">語り始める</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="895" y="190" width="220" height="150" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1005" y="243" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="26" font-weight="700" fill="#1e293b">スタッフ</text>
    <text x="1005" y="280" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="16" fill="#475569">問いかけの</text>
    <text x="1005" y="306" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="16" fill="#475569">きっかけを得る</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="895" y="410" width="220" height="150" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1005" y="463" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="26" font-weight="700" fill="#1e293b">鑑賞者</text>
    <text x="1005" y="500" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="16" fill="#475569">作品を見る入口を</text>
    <text x="1005" y="526" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="16" fill="#475569">持ちやすくなる</text>
  </g>

  <path d="M308 302 C390 265 462 264 503 292" fill="none" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M505 357 C450 400 374 393 307 347" fill="none" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M702 288 C770 222 827 223 890 250" fill="none" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M708 375 C778 445 832 470 890 483" fill="none" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>

  <g font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="16" fill="#334155">
    <text x="405" y="250">作品を読む</text>
    <text x="360" y="425">自己理解のきっかけ</text>
    <text x="765" y="210">問いかけに使う</text>
    <text x="770" y="532">鑑賞の入口</text>
  </g>
</svg>
