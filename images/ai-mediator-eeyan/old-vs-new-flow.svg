<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">旧システムと新システムの違い</title>
  <desc id="desc">旧システムは一発生成で終わる。新システムはAIコメントをチャットで修正し、ポートフォリオに蓄積する。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="70" y="70" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="34" font-weight="700" fill="#1e293b">一発生成から対話的な修正へ</text>

  <g filter="url(#shadow)">
    <rect x="70" y="125" width="1060" height="180" rx="24" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="110" y="175" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="26" font-weight="700" fill="#475569">旧システム</text>
    <rect x="250" y="160" width="170" height="88" rx="16" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="335" y="212" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="19" font-weight="700" fill="#334155">画像アップロード</text>
    <rect x="520" y="160" width="170" height="88" rx="16" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="605" y="212" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="19" font-weight="700" fill="#075985">一発生成</text>
    <rect x="790" y="160" width="170" height="88" rx="16" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="875" y="200" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="18" font-weight="700" fill="#991b1b">なんか違う</text>
    <text x="875" y="226" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#991b1b">でも修正できない</text>
    <path d="M430 204 H500" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M700 204 H770" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="355" width="1060" height="200" rx="24" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="110" y="405" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="26" font-weight="700" fill="#047857">新システム</text>
    <rect x="220" y="430" width="155" height="88" rx="16" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="298" y="482" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="18" font-weight="700" fill="#334155">画像アップロード</text>
    <rect x="455" y="430" width="155" height="88" rx="16" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="533" y="470" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="18" font-weight="700" fill="#075985">AIコメント</text>
    <text x="533" y="496" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#075985">下案を出す</text>
    <rect x="690" y="430" width="155" height="88" rx="16" fill="#dcfce7" stroke="#86efac"/>
    <text x="768" y="470" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="18" font-weight="700" fill="#166534">チャット修正</text>
    <text x="768" y="496" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#166534">対話的に調整</text>
    <rect x="925" y="430" width="155" height="88" rx="16" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="1003" y="470" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="17" font-weight="700" fill="#92400e">ポートフォリオ</text>
    <text x="1003" y="496" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#92400e">作品情報を蓄積</text>
    <path d="M385 474 H435" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M620 474 H670" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M855 474 H905" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  </g>
</svg>
