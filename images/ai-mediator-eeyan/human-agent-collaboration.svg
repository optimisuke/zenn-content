<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">人間とコーディングエージェントの分担</title>
  <desc id="desc">人間が方針決定、原因特定、プロンプト設計を担当し、エージェントが実装、テスト、整形、ドキュメント更新を担当する分担。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="600" fill="#f8fafc"/>
  <text x="70" y="82" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="34" font-weight="700" fill="#1e293b">人間とエージェントの分担</text>

  <g filter="url(#shadow)">
    <rect x="95" y="175" width="440" height="310" rx="26" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="315" cy="250" r="46" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <circle cx="315" cy="236" r="14" fill="#2563eb"/>
    <path d="M284 278 C297 258 333 258 346 278" fill="#2563eb"/>
    <text x="315" y="334" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="28" font-weight="700" fill="#1e293b">人間が持つ</text>
    <text x="315" y="380" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="18" fill="#475569">SDK・インフラの選定</text>
    <text x="315" y="416" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="18" fill="#475569">プロンプト設計</text>
    <text x="315" y="452" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="18" fill="#475569">根本原因の特定</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="665" y="175" width="440" height="310" rx="26" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="885" cy="250" r="46" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
    <rect x="856" y="232" width="58" height="36" rx="10" fill="#16a34a"/>
    <circle cx="870" cy="250" r="5" fill="#dcfce7"/>
    <circle cx="900" cy="250" r="5" fill="#dcfce7"/>
    <path d="M867 267 H903" stroke="#dcfce7" stroke-width="4" stroke-linecap="round"/>
    <text x="885" y="334" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="28" font-weight="700" fill="#1e293b">エージェントに任せる</text>
    <text x="885" y="380" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="18" fill="#475569">実装</text>
    <text x="885" y="416" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="18" fill="#475569">テストコード</text>
    <text x="885" y="452" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="18" fill="#475569">ドキュメント更新</text>
  </g>

  <rect x="488" y="270" width="224" height="70" rx="20" fill="#fff7ed" stroke="#fdba74"/>
  <text x="600" y="298" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="17" font-weight="700" fill="#9a3412">原因が見えたら</text>
  <text x="600" y="324" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="17" font-weight="700" fill="#9a3412">実装を渡す</text>
</svg>
