<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">ええやん！.ai の全体像</title>
  <desc id="desc">作品画像をAIが読み取り、コメントをきっかけに会話が生まれ、作品情報がポートフォリオとして蓄積される流れ。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="560" fill="url(#bg)"/>
  <text x="72" y="82" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="34" font-weight="700" fill="#1e293b">AIが仲介者になる</text>

  <g filter="url(#shadow)">
    <rect x="70" y="190" width="190" height="180" rx="22" fill="#ffffff"/>
    <rect x="103" y="222" width="124" height="86" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
    <path d="M118 292 L150 258 L174 283 L192 264 L216 292 Z" fill="#34d399" opacity="0.85"/>
    <circle cx="190" cy="246" r="12" fill="#fb7185"/>
    <text x="165" y="334" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="22" font-weight="700" fill="#1e293b">作品</text>
    <text x="165" y="360" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="14" fill="#475569">画像をもとにする</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="190" width="190" height="180" rx="22" fill="#ffffff"/>
    <circle cx="455" cy="252" r="44" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <path d="M427 256 C442 230 468 230 483 256" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
    <circle cx="440" cy="243" r="5" fill="#2563eb"/>
    <circle cx="470" cy="243" r="5" fill="#2563eb"/>
    <text x="455" y="334" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="22" font-weight="700" fill="#1e293b">AIコメント</text>
    <text x="455" y="360" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="14" fill="#475569">タイトル・説明文</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="650" y="190" width="210" height="180" rx="22" fill="#ffffff"/>
    <path d="M694 238 h112 a18 18 0 0 1 18 18 v28 a18 18 0 0 1 -18 18 h-54 l-33 28 v-28 h-25 a18 18 0 0 1 -18 -18 v-28 a18 18 0 0 1 18 -18 z" fill="#ecfccb" stroke="#65a30d" stroke-width="3"/>
    <path d="M720 255 h66 M720 276 h46" stroke="#365314" stroke-width="6" stroke-linecap="round"/>
    <text x="755" y="334" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="22" font-weight="700" fill="#1e293b">会話</text>
    <text x="755" y="360" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="14" fill="#475569">どう思うかを話す</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="960" y="190" width="170" height="180" rx="22" fill="#ffffff"/>
    <rect x="995" y="226" width="100" height="20" rx="6" fill="#c7d2fe"/>
    <rect x="995" y="258" width="100" height="20" rx="6" fill="#bae6fd"/>
    <rect x="995" y="290" width="100" height="20" rx="6" fill="#bbf7d0"/>
    <text x="1045" y="334" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="18" font-weight="700" fill="#1e293b">ポートフォリオ</text>
    <text x="1045" y="360" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="14" fill="#475569">作品情報を残す</text>
  </g>

  <path d="M275 280 H337" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M565 280 H627" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M878 280 H937" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <g font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="16" fill="#475569">
    <text x="303" y="251" text-anchor="middle">読み取る</text>
    <text x="596" y="251" text-anchor="middle">話題にする</text>
    <text x="908" y="251" text-anchor="middle">残して使う</text>
  </g>

</svg>
