<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Terraform と GitHub Actions のデプロイフロー</title>
  <desc id="desc">Pull Request では terraform plan を実行し、main へのマージ後に terraform apply、Docker build、Container Apps へのデプロイを行う。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="70" y="70" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="34" font-weight="700" fill="#1e293b">Terraform / GitOps 化</text>

  <g filter="url(#shadow)">
    <rect x="80" y="145" width="170" height="90" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="165" y="198" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="21" font-weight="700" fill="#334155">開発者</text>
    <rect x="340" y="145" width="190" height="90" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="435" y="184" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="21" font-weight="700" fill="#334155">Pull Request</text>
    <text x="435" y="212" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#64748b">feature branch</text>
    <rect x="635" y="145" width="210" height="90" rx="16" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="740" y="184" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="21" font-weight="700" fill="#075985">terraform plan</text>
    <text x="740" y="212" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#075985">結果をコメント</text>
    <rect x="940" y="145" width="180" height="90" rx="16" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="1030" y="198" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="21" font-weight="700" fill="#334155">レビュー</text>
  </g>

  <path d="M260 190 H320" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M540 190 H615" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M855 190 H920" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="110" y="350" width="190" height="90" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="205" y="389" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="21" font-weight="700" fill="#334155">main merge</text>
    <text x="205" y="417" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#64748b">push event</text>
    <rect x="390" y="350" width="190" height="90" rx="16" fill="#dcfce7" stroke="#86efac"/>
    <text x="485" y="389" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="19" font-weight="700" fill="#166534">terraform apply</text>
    <text x="485" y="417" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#166534">Azureへ反映</text>
    <rect x="670" y="350" width="190" height="90" rx="16" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="765" y="389" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="21" font-weight="700" fill="#92400e">Docker build</text>
    <text x="765" y="417" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#92400e">ACR push</text>
    <rect x="950" y="350" width="190" height="90" rx="16" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="1045" y="389" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="21" font-weight="700" fill="#075985">deploy</text>
    <text x="1045" y="417" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',Arial,sans-serif" font-size="15" fill="#075985">Container Apps</text>
  </g>

  <path d="M310 395 H370" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M590 395 H650" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M870 395 H930" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

</svg>
